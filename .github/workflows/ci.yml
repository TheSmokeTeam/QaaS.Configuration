name: CI

on:
  push:
    branches: ["**"]
    tags: ["*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  PROJECT_PATH: QaaS.Configuration.sln
  PACKAGE_PROJECT_PATH: QaaS.Configuration\QaaS.Configuration.csproj
  PACKAGE_OUTPUT_DIRECTORY: ${{ github.workspace }}\BuildOutput
  QAAS_NUGET_PUSH_SOURCE_URL: ${{ vars.QAAS_NUGET_PUSH_SOURCE_URL || 'https://api.nuget.org/v3/index.json' }}

jobs:
  build-test-deploy:
    name: Build, Pack & Deploy
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Detect tag
        id: stable_tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "is_stable_tag=true" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore packages
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build project
        run: dotnet build ${{ env.PROJECT_PATH }} --no-restore --configuration ${{ env.CONFIGURATION }} -m:1

      - name: Test project
        run: dotnet test ${{ env.PROJECT_PATH }} --no-build --configuration ${{ env.CONFIGURATION }}

      - name: Pack package
        if: steps.stable_tag.outputs.is_stable_tag == 'true'
        run: |
          dotnet pack ${{ env.PACKAGE_PROJECT_PATH }} `
            --no-restore `
            --no-build `
            --configuration ${{ env.CONFIGURATION }} `
            --include-symbols `
            -p:DebugType=portable `
            -p:SymbolPackageFormat=snupkg `
            -p:PackageVersion=${{ steps.stable_tag.outputs.tag }} `
            -p:Version=${{ steps.stable_tag.outputs.tag }} `
            --output ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

      - name: Upload package artifacts
        if: steps.stable_tag.outputs.is_stable_tag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{ env.PACKAGE_OUTPUT_DIRECTORY }}
          if-no-files-found: error
          retention-days: 7

      - name: Push package
        if: steps.stable_tag.outputs.is_stable_tag == 'true'
        run: dotnet nuget push ${{ env.PACKAGE_OUTPUT_DIRECTORY }}\*.nupkg -k ${{ secrets.NUGET_AUTH_TOKEN }} -s "${{ env.QAAS_NUGET_PUSH_SOURCE_URL }}" --skip-duplicate

      - name: Push symbol package
        if: steps.stable_tag.outputs.is_stable_tag == 'true'
        shell: pwsh
        run: |
          $symbolPackages = Get-ChildItem "${{ env.PACKAGE_OUTPUT_DIRECTORY }}" -Filter "*.snupkg" -File
          foreach ($package in $symbolPackages) {
            dotnet nuget push $package.FullName -k ${{ secrets.NUGET_AUTH_TOKEN }} -s "${{ env.QAAS_NUGET_PUSH_SOURCE_URL }}" --skip-duplicate
          }
